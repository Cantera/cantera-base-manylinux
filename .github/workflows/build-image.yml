name: Build Image from Dockerfile
on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".github/workflows/build-image.yml"
      - "CMakeLists.txt"
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".github/workflows/build-image.yml"
      - "CMakeLists.txt"
  workflow_dispatch:
    inputs:
      manylinux_tag:
        description: "Manylinux tag to build"
        required: true
        default: "2026.02.01-1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build image for ${{ matrix.arch }}
    runs-on: ubuntu-24.04${{ matrix.arch == 'aarch64' && '-arm' || '' }}
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        include:
          - arch: x86_64
            plat: linux/amd64
          - arch: aarch64
            plat: linux/arm64
    steps:
      - name: Checkout the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ghcr.io/cantera/cantera-base-manylinux_2_28-${{ matrix.arch }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
      - name: Build args
        id: build-args
        run: |
          {
            echo 'BUILD_ARGS<<EOF'
            echo TARGET_ARCH=${{ matrix.arch }}
            if [ -n "$MANYLINUX_TAG_INPUT" ]; then
              echo MANYLINUX_TAG=$MANYLINUX_TAG_INPUT
            fi
            echo EOF
          } >> $GITHUB_OUTPUT
        env:
          MANYLINUX_TAG_INPUT: ${{ github.event.inputs.manylinux_tag }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          platforms: ${{ matrix.plat }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ steps.build-args.outputs.BUILD_ARGS }}
          cache-from: ${{ github.event_name != 'pull_request' && 'type=gha' || '' }}
          cache-to: ${{ github.event_name != 'pull_request' && 'type=gha,mode=max' || '' }}
